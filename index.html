<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<link rel="manifest" href="manifest.json">

<title>Aula Aesthetic de Mila 💖</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  font-family: Inter, sans-serif;
  background: linear-gradient(135deg, #fdf2f8, #ede9fe, #f0fdf4);
}

.glass {
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.6);
}

.card {
  transition: all 0.3s ease;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
}

button {
  transition: all 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
}

button:active {
  transform: scale(0.95);
}

.fade {
  animation: fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(10px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body class="text-gray-800">

<div class="flex h-screen">

<!-- SIDEBAR -->
<aside class="w-64 glass p-6 hidden md:flex flex-col rounded-r-2xl">

<h1 class="text-xl font-semibold mb-6 text-pink-500">💖 Aula de Mila</h1>

<button id="installBtn" class="bg-pink-400 text-white p-2 rounded-xl mb-3 hidden">
📲 Instalar app
</button>

<button onclick="activarNotificaciones()" class="bg-green-400 text-white p-2 rounded-xl mb-3">
🔔 Notificaciones
</button>

<button onclick="exportarDatos()" class="bg-blue-400 text-white p-2 rounded-xl mb-3">
💾 Exportar
</button>

<input type="file" onchange="importarDatos(event)" class="mb-6">

<nav class="space-y-3">
<button onclick="mostrar('dashboard', this)" class="nav-item bg-pink-200 px-4 py-2 rounded-xl">🌸 Dashboard</button>
<button onclick="mostrar('cursos', this)" class="nav-item px-4 py-2 rounded-xl">📚 Cursos</button>
<button onclick="mostrar('tareas', this)" class="nav-item px-4 py-2 rounded-xl">✅ Tareas</button>
</nav>

</aside>

<!-- CONTENIDO -->
<main class="flex-1 p-8 overflow-y-auto">

<section id="dashboard">
<h2 class="text-2xl font-bold mb-6 text-pink-500">Dashboard</h2>
<div id="resumen" class="grid md:grid-cols-3 gap-4"></div>
</section>

<section id="cursos" class="hidden">
<h2 class="text-2xl font-bold mb-6 text-pink-500">Cursos</h2>

<div class="flex gap-2 mb-4">
<input id="cursoInput" class="flex-1 border rounded p-2" placeholder="Nuevo curso">
<button onclick="agregarCurso()" class="bg-pink-400 text-white px-4 rounded">Crear</button>
</div>

<div id="listaCursos"></div>
</section>

<section id="tareas" class="hidden">
<h2 class="text-2xl font-bold mb-6 text-pink-500">Tareas</h2>

<div class="flex gap-2 mb-4">
<input id="tareaInput" class="flex-1 border rounded p-2" placeholder="Tarea">
<input id="fechaInput" type="date" class="border p-2">
<button onclick="agregarTarea()" class="bg-pink-400 text-white px-4 rounded">Agregar</button>
</div>

<div id="listaTareas"></div>
</section>

</main>
</div>

<script>
let cursos = JSON.parse(localStorage.getItem("cursos")) || [];
let tareas = JSON.parse(localStorage.getItem("tareas")) || [];

function mostrar(sec){
document.querySelectorAll("section").forEach(s=>s.classList.add("hidden"));
document.getElementById(sec).classList.remove("hidden");
}

/* CURSOS */
function agregarCurso(){
let val = cursoInput.value;
if(!val) return;
cursos.push({nombre:val, apuntes:[]});
guardar();
renderCursos();
}

function agregarApunte(i){
let input = document.getElementById("ap-"+i);
if(!input.value) return;

cursos[i].apuntes.push({texto:input.value,archivo:null});
input.value="";
guardar();
renderCursos();
}

function subirArchivo(e,i){
let file = e.target.files[0];
let reader = new FileReader();

reader.onload = function(ev){
cursos[i].apuntes.push({
texto:file.name,
archivo:{data:ev.target.result,tipo:file.type}
});
guardar();
renderCursos();
}
reader.readAsDataURL(file);
}

function editarApunte(i,j,texto){
cursos[i].apuntes[j].texto = texto;
guardar();
}

function eliminarApunte(i,j){
cursos[i].apuntes.splice(j,1);
guardar();
renderCursos();
}

function renderCursos(){
let cont = listaCursos;
cont.innerHTML="";

cursos.forEach((c,i)=>{
cont.innerHTML += `
<div class="glass p-4 mb-4 rounded-xl">

<h3 class="text-pink-500 font-bold mb-2">${c.nombre}</h3>

<div class="flex gap-2 mb-2">
<input id="ap-${i}" class="flex-1 border p-2 rounded" placeholder="Apunte" onkeypress="if(event.key==='Enter') agregarApunte(${i})">
<button onclick="agregarApunte(${i})">+</button>
</div>

<input type="file" onchange="subirArchivo(event,${i})">

${c.apuntes.map((a,j)=>`
<div class="bg-white p-3 mt-2 rounded">
<div contenteditable onblur="editarApunte(${i},${j},this.innerText)">
${a.texto}
</div>

${a.archivo ? (a.archivo.tipo.startsWith("image")
? `<img src="${a.archivo.data}" class="mt-2">`
: `<a href="${a.archivo.data}" download>📄 Descargar</a>`) : ""}

<button onclick="eliminarApunte(${i},${j})" class="text-red-400">Eliminar</button>
</div>
`).join("")}

</div>`;
});
}

/* TAREAS */
function agregarTarea(){
let t = tareaInput.value;
let f = fechaInput.value;
if(!t||!f) return;

tareas.push({texto:t,fecha:f,hecho:false});
guardar();
renderTareas();
}

function toggleTarea(i){
tareas[i].hecho=!tareas[i].hecho;
guardar();
renderTareas();
}

function renderTareas(){
listaTareas.innerHTML="";

tareas.forEach((t,i)=>{
listaTareas.innerHTML+=`
<div class="bg-white p-3 mb-2 rounded flex justify-between">
<div>${t.texto} <br><small>${t.fecha}</small></div>
<button onclick="toggleTarea(${i})">✔</button>
</div>`;
});

revisarTareasHoy();
}

/* NOTIFICACIONES */
function activarNotificaciones(){
Notification.requestPermission();
}

function revisarTareasHoy(){
let hoy = new Date().toISOString().split("T")[0];
tareas.forEach(t=>{
if(t.fecha===hoy && !t.hecho){
new Notification("📚 Tarea pendiente",{body:t.texto});
}
});
}

/* BACKUP */
function exportarDatos(){
let data = JSON.stringify({cursos,tareas});
let a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([data]));
a.download="backup.json";
a.click();
}

function importarDatos(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(ev){
let data=JSON.parse(ev.target.result);
cursos=data.cursos||[];
tareas=data.tareas||[];
guardar();
renderCursos();
renderTareas();
}
reader.readAsText(file);
}

/* DASHBOARD */
function renderDashboard(){
resumen.innerHTML=`
<div class="bg-white p-4 rounded">Cursos: ${cursos.length}</div>
<div class="bg-white p-4 rounded">Pendientes: ${tareas.filter(t=>!t.hecho).length}</div>
`;
}

/* SAVE */
function guardar(){
localStorage.setItem("cursos",JSON.stringify(cursos));
localStorage.setItem("tareas",JSON.stringify(tareas));
}

/* INSTALL BUTTON */
let deferredPrompt;
window.addEventListener("beforeinstallprompt",(e)=>{
e.preventDefault();
deferredPrompt=e;
installBtn.classList.remove("hidden");
});

installBtn.onclick=()=>{
deferredPrompt.prompt();
};

/* INIT */
renderCursos();
renderTareas();
renderDashboard();

/* SERVICE WORKER */
if("serviceWorker" in navigator){
navigator.serviceWorker.register("service-worker.js?v=5");
}
</script>

</body>
</html>
