<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title id="tituloApp">Aula Virtual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-pink-50 transition-all duration-500 dark:bg-slate-900">

    <div id="loginScreen" class="fixed inset-0 z-[100] flex items-center justify-center bg-white dark:bg-slate-900 transition-all">
        <div class="p-8 w-80 text-center shadow-2xl border-2 border-pink-100 dark:border-slate-700 rounded-3xl bg-white dark:bg-slate-800">
            <div id="accountSelector">
                <span class="text-4xl">🎓</span>
                <h2 class="text-2xl font-bold mt-2 text-gray-700 dark:text-white">Bienvenido</h2>
                <p class="text-xs text-gray-500 mb-6 italic">Selecciona tu cuenta</p>
                <div class="space-y-3">
                    <button onclick="prepararLogin('mila')" class="w-full flex items-center p-3 rounded-xl border border-pink-200 hover:bg-pink-50 transition-all bg-white dark:bg-slate-700 dark:hover:bg-slate-600 dark:border-slate-600">
                        <span class="bg-pink-100 p-2 rounded-full mr-3 text-lg">💖</span>
                        <p class="font-bold text-sm text-gray-800 dark:text-white">Mila</p>
                    </button>
                    <button onclick="prepararLogin('benjamin')" class="w-full flex items-center p-3 rounded-xl border border-blue-200 hover:bg-blue-50 transition-all bg-white dark:bg-slate-700 dark:hover:bg-slate-600 dark:border-slate-600">
                        <span class="bg-blue-100 p-2 rounded-full mr-3 text-lg">💙</span>
                        <p class="font-bold text-sm text-gray-800 dark:text-white">Benjamin</p>
                    </button>
                </div>
            </div>
            <div id="passwordArea" class="hidden">
                <button onclick="volverASeleccion()" class="text-xs text-gray-400 mb-4 underline">← Cambiar cuenta</button>
                <h3 id="userDisplay" class="font-bold text-lg mb-2 text-pink-600"></h3>
                <input type="password" id="passInput" class="w-full p-3 rounded-xl text-center mb-3 border outline-none dark:bg-slate-700 dark:text-white dark:border-slate-600" placeholder="Contraseña">
                <button onclick="validarPassword()" class="w-full p-3 rounded-xl bg-pink-500 text-white font-bold hover:bg-pink-600 transition-all">Entrar</button>
                <p id="passError" class="text-red-500 text-[10px] mt-2 hidden font-bold">⚠️ Contraseña incorrecta</p>
            </div>
        </div>
    </div>

    <div class="flex h-screen">
        
        <aside class="w-64 p-6 hidden md:flex flex-col bg-white border-r border-pink-100 dark:bg-slate-800 dark:border-slate-700">
            <h1 id="nombreApp" class="text-xl font-bold text-pink-500 mb-8 italic text-center">💖 Aula Virtual</h1>
            <nav class="space-y-3">
                <button onclick="mostrar('dashboard')" class="w-full p-3 rounded-xl text-left text-sm font-semibold hover:bg-pink-50 dark:hover:bg-slate-700 dark:text-white transition-all">📊 Dashboard</button>
                <button onclick="mostrar('cursos')" class="w-full p-3 rounded-xl text-left text-sm font-semibold hover:bg-pink-50 dark:hover:bg-slate-700 dark:text-white transition-all">📚 Cursos</button>
                <button onclick="mostrar('tareas')" class="w-full p-3 rounded-xl text-left text-sm font-semibold hover:bg-pink-50 dark:hover:bg-slate-700 dark:text-white transition-all">✅ Tareas</button>
                <button onclick="cerrarSesion()" class="w-full p-3 mt-10 rounded-xl text-left text-xs font-bold text-gray-400 hover:text-red-500">👤 Salir</button>
            </nav>
        </aside>

        <main id="mainContent" class="flex-1 p-6 overflow-y-auto bg-pink-50/30 dark:bg-slate-900 relative">
            
            <button onclick="cerrarSesion()" class="md:hidden absolute top-4 right-4 z-50 bg-white/80 dark:bg-slate-800 p-2 rounded-full shadow-sm border border-pink-100 dark:border-slate-700">
                <span class="text-sm font-bold text-pink-600 dark:text-blue-400">👤 Salir</span>
            </button>

            <section id="dashboard" class="animate-fade-in">
                <h2 class="text-2xl font-bold mb-6 dark:text-white">Dashboard</h2>
                <div id="resumen" class="grid grid-cols-2 gap-4 mb-8"></div>
                <div id="accesoDirectoCursos" class="hidden">
                    <h3 class="font-bold mb-4 text-gray-600 dark:text-gray-400">📖 Mis Cursos</h3>
                    <div id="listaCursosDirectos" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
                </div>
            </section>

            <section id="cursos" class="hidden animate-fade-in">
                <h2 class="text-2xl font-bold mb-4 dark:text-white">Cursos</h2>
                <div class="bg-white p-4 rounded-2xl shadow-sm border mb-6 dark:bg-slate-800 dark:border-slate-700">
                    <input id="cursoInput" class="w-full p-3 rounded-xl mb-3 border dark:bg-slate-700 dark:text-white dark:border-slate-600 outline-none" placeholder="Nombre del curso">
                    <button onclick="agregarCurso()" class="btn-main px-6 py-2">Crear curso</button>
                </div>
                <div id="listaCursos" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </section>

            <section id="semanas" class="hidden animate-fade-in">
                <button onclick="mostrar('cursos')" class="text-pink-500 mb-4 block underline text-sm font-bold">← Volver</button>
                <h2 id="tituloCurso" class="text-2xl font-bold mb-4 dark:text-white"></h2>
                <div class="bg-white p-4 rounded-2xl shadow-sm border mb-6 dark:bg-slate-800 dark:border-slate-700">
                    <input id="semanaInput" class="input w-full p-3 rounded-xl mb-3 outline-none" placeholder="Nombre: Semana 01">
                    <button onclick="agregarSemana()" class="btn-main w-full py-2">Añadir Semana</button>
                </div>
                <div id="listaSemanas" class="space-y-3"></div>
            </section>

            <section id="apuntes" class="hidden animate-fade-in">
                <button onclick="mostrar('semanas')" class="text-pink-500 mb-4 block underline text-sm font-bold">← Volver</button>
                <h2 id="tituloSemana" class="text-2xl font-bold mb-4 dark:text-white text-pink-600"></h2>
                <button onclick="agregarSeccion()" class="btn-main w-full py-4 mb-6 shadow-lg">+ Nueva Sección</button>
                <div id="listaApuntes" class="space-y-6"></div>
            </section>

            <section id="tareas" class="hidden animate-fade-in">
                <h2 class="text-2xl font-bold mb-4 dark:text-white">Tareas</h2>
                <div class="bg-white p-4 rounded-2xl shadow-sm border mb-6 dark:bg-slate-800 dark:border-slate-700">
                    <input id="tareaInput" class="w-full p-3 rounded-xl mb-2 border dark:bg-slate-700 dark:text-white dark:border-slate-600 outline-none" placeholder="¿Qué hay que hacer?">
                    <input id="fechaInput" type="datetime-local" class="w-full p-3 rounded-xl mb-3 border dark:bg-slate-700 dark:text-white dark:border-slate-600">
                    <button onclick="agregarTarea()" class="btn-main w-full py-3">Agregar tarea</button>
                </div>
                <div id="listaTareas" class="space-y-3"></div>
            </section>
        </main>

        <div class="tab-bar">
            <button onclick="mostrar('dashboard')" class="text-2xl">📊</button>
            <button onclick="mostrar('cursos')" class="text-2xl">📚</button>
            <button onclick="mostrar('tareas')" class="text-2xl">✅</button>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="dashboard.js"></script>
    <script src="cursos.js"></script>
    <script src="tareas.js"></script>
    <script src="apuntes.js"></script>

    <script>
        function mostrar(sec) {
            // Oculta todas las secciones
            document.querySelectorAll("section").forEach(s => s.classList.add("hidden"));
            // Muestra la seleccionada
            const target = document.getElementById(sec);
            if(target) {
                target.classList.remove("hidden");
                // Lógica especial para limpiar el dashboard si es necesario
                if(sec === 'dashboard' && document.getElementById("accesoDirectoCursos")) {
                    document.getElementById("accesoDirectoCursos").classList.add("hidden");
                }
            }
        }
    </script>
</body>
</html>
